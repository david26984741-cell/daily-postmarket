name: 回補日K股價

# 手動觸發: 回補個股現貨日K (只動 data/kline/, 與大額交易人回補互不干擾, 可並行)。

on:
  workflow_dispatch:
    inputs:
      start:
        description: "起始日期 YYYY/MM/DD"
        required: true
      end:
        description: "結束日期 YYYY/MM/DD"
        required: true
      sleep:
        description: "每日之間間隔秒數"
        required: false
        default: "1.0"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-postmarket-kline
  cancel-in-progress: false

jobs:
  backfill-kline:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TZ: Asia/Taipei
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 回補日K
        run: |
          python tools/backfill_kline.py --start ${{ github.event.inputs.start }} --end ${{ github.event.inputs.end }} --sleep ${{ github.event.inputs.sleep }}

      - name: Commit 資料更新
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "無資料變更";
          else
            git commit -m "回補日K ${{ github.event.inputs.start }} ~ ${{ github.event.inputs.end }}"
            git pull --rebase --autostash || true
            git push
          fi

      - name: 準備網站檔案
        if: always()
        run: |
          rm -rf _site && mkdir -p _site
          cp -r index.html stocks.html detail.html stock.html rank.html assets data .nojekyll _site/ 2>/dev/null || true

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        if: always()
        uses: actions/deploy-pages@v4
