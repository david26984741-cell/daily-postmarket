name: 回補日K股價

# 手動觸發: 回補個股現貨日K (只動 data/kline/, 與大額交易人回補互不干擾, 可並行)。

on:
  workflow_dispatch:
    inputs:
      start:
        description: "起始日期 YYYY/MM/DD"
        required: true
      end:
        description: "結束日期 YYYY/MM/DD"
        required: true
      sleep:
        description: "每日之間間隔秒數"
        required: false
        default: "1.0"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-postmarket-kline
  cancel-in-progress: false

jobs:
  backfill-kline:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TZ: Asia/Taipei
    steps:
      # ref: main — 取職務開跑當下的最新版, 避免佇列等待期間基底過期導致 rebase 衝突
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 回補日K
        run: |
          python tools/backfill_kline.py --start ${{ github.event.inputs.start }} --end ${{ github.event.inputs.end }} --sleep ${{ github.event.inputs.sleep }}

      - name: Commit 資料更新
        if: always()
        run: |
          pkill -9 -f backfill_kline.py 2>/dev/null || true
          sleep 3
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MSG="回補日K ${{ github.event.inputs.start }} ~ ${{ github.event.inputs.end }}"
          git add -A data/
          if git diff --cached --quiet; then
            echo "無資料變更"; exit 0
          fi
          git commit -m "$MSG"
          for i in 1 2 3 4; do
            git add -A data/
            git diff --cached --quiet || git commit -m "$MSG (補收$i)"
            git checkout -- . 2>/dev/null || true
            git fetch origin main
            if git rebase origin/main; then
              git push origin main && exit 0
            else
              git rebase --abort || true
            fi
            echo "push 失敗, 15 秒後重試 ($i/4)"; sleep 15
          done
          exit 1

      - name: 準備網站檔案
        if: always()
        run: |
          rm -rf _site && mkdir -p _site
          cp -r index.html stocks.html detail.html stock.html rank.html help.html analysis.html assets data .nojekyll _site/ 2>/dev/null || true

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        if: always()
        uses: actions/deploy-pages@v4
