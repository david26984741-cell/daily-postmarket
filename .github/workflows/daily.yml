name: 每日盤後資料抓取與部署

on:
  schedule:
    # UTC 07:35 = 台北 15:35 (週一至週五)。此時期交所/證交所盤後資料已公布完畢,
    # 一抓即到、不需長時間重試。腳本內含休市判斷與 30 分鐘重試作為保險,非交易日自動略過。
    # 註:GitHub 免費排程為「盡力而為」,實際觸發常延後到傍晚, 屬正常現象。
    - cron: "35 7 * * 1-5"
    # 備援班次 UTC 13:35 = 台北 21:35:主班次被 GitHub 跳過時的保險 (2026/07/09 即發生過)。
    # 同日重跑僅覆蓋當日資料、不影響歷史;若主班次已成功, 此班次抓到相同資料, 無資料變更即不 commit。
    - cron: "35 13 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "手動指定日期 YYYY/MM/DD (留空=今天)"
        required: false
      no_retry:
        description: "略過 30 分鐘重試 (true/false)"
        required: false
        default: "false"

# Pages 官方部署所需權限 (較「分支自動部署」穩定)
permissions:
  contents: write   # 允許 commit 回 main
  pages: write      # 允許部署 GitHub Pages
  id-token: write   # 部署身分驗證

concurrency:
  group: daily-postmarket
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TZ: Asia/Taipei
      RETRY_WAIT: "1800"   # 30 分鐘
      MAX_RETRY: "6"       # 最多重試 6 次 (約 3 小時)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 執行抓取
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then ARGS="--date ${{ github.event.inputs.date }}"; fi
          if [ "${{ github.event.inputs.no_retry }}" = "true" ]; then ARGS="$ARGS --no-retry"; fi
          python scrape.py $ARGS

      - name: Commit 資料更新
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MSG="資料更新 $(date -u -d '+8 hour' '+%Y/%m/%d %H:%M') (台北)"
          git add -A data/
          if git diff --cached --quiet; then
            echo "無資料變更 (可能為非交易日或資料未更新)"; exit 0
          fi
          git commit -m "$MSG"
          git checkout -- . 2>/dev/null || true
          for i in 1 2 3; do
            git fetch origin main
            if git rebase origin/main; then
              git push origin main && exit 0
            else
              git rebase --abort || true
            fi
            echo "push 失敗, 10 秒後重試 ($i/3)"; sleep 10
          done
          exit 1

      # ---- 由工作流程直接部署網站 (取代不穩定的分支自動部署) ----
      - name: 準備網站檔案
        run: |
          rm -rf _site && mkdir -p _site
          cp -r index.html stocks.html detail.html stock.html rank.html help.html assets data .nojekyll _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# 部署方式:GitHub 官方 Actions 部署 (Settings → Pages → Source 設為 "GitHub Actions")。
# 每次工作流程執行都會直接把最新網站內容部署上去, 不再依賴不穩定的分支自動部署;
# 即使某次失敗, 下一次執行也會自動補上。固定網址: https://<帳號>.github.io/<倉庫名>/
