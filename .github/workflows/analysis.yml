name: 籌碼研究分析

# 每週日上午重算 (資料為上週五收盤後全量), 亦可手動觸發。

on:
  schedule:
    - cron: "0 2 * * 0"   # UTC 02:00 週日 = 台北 10:00 週日
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-postmarket-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # ref: main — 取職務開跑當下的最新版, 避免佇列等待期間基底過期導致 rebase 衝突
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install --quiet pandas numpy scikit-learn lightgbm

      - name: 執行分析
        run: |
          python tools/analyze.py
          python tools/analyze_index.py

      - name: Commit 分析結果
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MSG="籌碼研究分析更新"
          git add -A data/analysis.json data/analysis_index.json
          if git diff --cached --quiet; then
            echo "無變更"; exit 0
          fi
          git commit -m "$MSG"
          for i in 1 2 3 4; do
            git checkout -- . 2>/dev/null || true
            git fetch origin main
            if git rebase origin/main; then
              git push origin main && exit 0
            else
              git rebase --abort || true
            fi
            echo "push 失敗, 15 秒後重試 ($i/4)"; sleep 15
          done
          exit 1

      - name: 準備網站檔案
        if: always()
        run: |
          rm -rf _site && mkdir -p _site
          cp -r index.html stocks.html detail.html stock.html rank.html concept.html help.html analysis.html assets data .nojekyll _site/ 2>/dev/null || true

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        if: always()
        uses: actions/deploy-pages@v4
