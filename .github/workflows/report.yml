name: 每日股期報告

# 「每日盤後資料抓取與部署」一跑完就自動接著跑 (workflow_run 事件觸發, 非定時輪詢),
# 所以不論是排程 15:35 主班次、21:35 備援, 還是手動 Run workflow, 報告都會緊接著寄出。
# 只有抓取「成功」才寄; 同一個資料日期只寄一次 (用 cache 防重複, 避免主班次+備援各寄一封)。
# 注意: 本 repo 為公開, 報告不寫檔、不 commit、不部署, 僅在記憶體處理後寄出。

on:
  workflow_run:
    workflows: ["每日盤後資料抓取與部署"]
    types: [completed]
  workflow_dispatch:
    inputs:
      force:
        description: "忽略防重複, 強制再寄一次 (測試用填 yes)"
        required: false
        default: "no"

permissions:
  contents: read

concurrency:
  group: daily-postmarket-report
  cancel-in-progress: false

jobs:
  report:
    # workflow_run: 只在來源 workflow 成功時才寄; 手動觸發則一律執行
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main            # 取開跑當下最新版 (資料已由來源 workflow commit)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 讀取資料日期
        id: d
        run: |
          echo "date=$(python -c "import json;print(json.load(open('data/rank.json'))['date'].replace('/','-'))")" >> $GITHUB_OUTPUT

      - name: 防重複 (同一資料日期只寄一次)
        id: sent
        uses: actions/cache@v4
        with:
          path: .sent
          key: report-sent-${{ steps.d.outputs.date }}

      # 中文字型: runner 預設沒有 CJK 字型, 不裝的話 matplotlib 圖與截圖都變豆腐方塊 (□□□)。
      - name: 安裝中文字型、matplotlib 與 Playwright
        if: steps.sent.outputs.cache-hit != 'true' || github.event.inputs.force == 'yes'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk >/dev/null
          fc-cache -f >/dev/null
          pip install --quiet matplotlib playwright
          python -m playwright install --with-deps chromium

      # 圖 1~4: 直接讀 data/*.json 自己畫 (不截網頁 → 不受版面限制、不必等部署)
      - name: 產生圖表 (4 張)
        id: charts
        if: steps.sent.outputs.cache-hit != 'true' || github.event.inputs.force == 'yes'
        continue-on-error: true
        run: python tools/charts.py --out .shots --days 60

      # 圖 5: 增減排行四宮格 — 表格型, 仍以網頁截圖處理
      - name: 產生排行截圖 (1 張)
        id: shots
        if: steps.sent.outputs.cache-hit != 'true' || github.event.inputs.force == 'yes'
        continue-on-error: true
        run: python tools/shots.py --out .shots

      - name: 產生並寄出報告
        if: steps.sent.outputs.cache-hit != 'true' || github.event.inputs.force == 'yes'
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          SHOTS_DIR: .shots
        run: |
          python tools/report.py
          mkdir -p .sent && date > .sent/ok

      # 供除錯: 在 Actions 頁面可直接下載當次截圖, 不進 repo
      - name: 保留圖片供檢視 (artifact)
        if: always() && (steps.charts.outcome == 'success' || steps.shots.outcome == 'success')
        uses: actions/upload-artifact@v4
        with:
          name: shots-${{ steps.d.outputs.date }}
          path: .shots/
          # 必要: v4 預設排除「.」開頭的隱藏目錄, 不加這行會 "No files were found"
          include-hidden-files: true
          retention-days: 7

      - name: 已寄過就略過
        if: steps.sent.outputs.cache-hit == 'true' && github.event.inputs.force != 'yes'
        run: echo "資料日期 ${{ steps.d.outputs.date }} 今日已寄過報告, 略過。"
