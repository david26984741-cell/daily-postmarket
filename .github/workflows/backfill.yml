name: 回補歷史資料

# 手動觸發:填入起訖日期, 按一次即可把整段期間的缺漏資料補齊, 補完自動部署網站。
#  - 自動略過 週末 / 休市日 / 已經有資料的日期
#  - 期交所可依日期回查, 因此選擇權、大額交易人、個股期貨都能完整回補
#  - 證交所「外資現貨」僅提供當日最新資料, 回補舊日期時該欄位會是空的 (屬正常)

on:
  workflow_dispatch:
    inputs:
      start:
        description: "起始日期 YYYY/MM/DD (例 2026/06/24)"
        required: true
      end:
        description: "結束日期 YYYY/MM/DD (例 2026/07/07)"
        required: true
      force:
        description: "已有資料的日期也重抓覆蓋 (true/false)"
        required: false
        default: "false"
      sleep:
        description: "每日之間間隔秒數"
        required: false
        default: "2.0"

permissions:
  contents: write
  pages: write
  id-token: write

# 與每日排程共用同一個佇列, 避免同時 commit / 部署互相衝突
concurrency:
  group: daily-postmarket
  cancel-in-progress: false

jobs:
  backfill-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TZ: Asia/Taipei
    steps:
      # ref: main — 取「職務開跑當下」的最新版, 而非「觸發當下」凍結的舊版。
      # 否則佇列等待期間若有其他回補先完成, 兩者改同批檔案, rebase 必衝突而丟失整批資料。
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 回補指定期間
        run: |
          ARGS="--start ${{ github.event.inputs.start }} --end ${{ github.event.inputs.end }}"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ -n "${{ github.event.inputs.sleep }}" ]; then ARGS="$ARGS --sleep ${{ github.event.inputs.sleep }}"; fi
          python tools/backfill.py $ARGS

      - name: Commit 資料更新
        if: always()   # 即使逾時被中止, 也把已抓到的部分 commit 起來, 重跑只需補剩餘區間
        run: |
          # 逾時取消後 python 可能仍在寫檔, 先強制終結, 否則工作樹永遠不乾淨、rebase 必敗
          pkill -9 -f backfill.py 2>/dev/null || true
          pkill -9 -f scrape.py 2>/dev/null || true
          sleep 3
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MSG="回補歷史 ${{ github.event.inputs.start }} ~ ${{ github.event.inputs.end }}"
          git add -A data/
          if git diff --cached --quiet; then
            echo "無資料變更 (該期間可能已全部補齊)"; exit 0
          fi
          git commit -m "$MSG"
          for i in 1 2 3 4; do
            # 每輪先補收「取消瞬間仍在寫入」的殘檔, 再清理工作樹, 確保 rebase 可執行
            git add -A data/
            git diff --cached --quiet || git commit -m "$MSG (補收$i)"
            git checkout -- . 2>/dev/null || true
            git fetch origin main
            if git rebase origin/main; then
              git push origin main && exit 0
            else
              git rebase --abort || true
            fi
            echo "push 失敗, 15 秒後重試 ($i/4)"; sleep 15
          done
          exit 1

      # ---- 部署網站 (與每日排程相同) ----
      - name: 準備網站檔案
        run: |
          rm -rf _site && mkdir -p _site
          cp -r index.html stocks.html detail.html stock.html rank.html concept.html screener.html help.html analysis.html assets data .nojekyll _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
