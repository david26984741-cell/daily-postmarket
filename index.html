<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>每日盤後資料 — 當日整合總覽</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="top"><div class="wrap">
  <h1>每日盤後資料<small>期交所 / 證交所 · 三大法人與大額交易人</small></h1>
  <nav class="main" id="nav"></nav>
</div></header>

<div class="wrap">
  <h2 class="sec">當日整合總覽 <span class="tag" id="dchip">載入中…</span></h2>
  <p class="lead">一頁掌握當日六大分類重點。點各分類標題可查看「歷史」明細。</p>
  <div id="status"></div>
  <div class="grid" id="grid"></div>

  <h2 class="sec">大額交易人股票期貨 <span class="tag" id="stkcount"></span></h2>
  <p class="lead">每檔個股期貨各自獨立頁面 (依契約名稱對齊歷史)。</p>
  <div class="stocklist" id="stocks"></div>

  <footer>
    資料來源:臺灣期貨交易所 (taifex.com.tw)、臺灣證券交易所 (twse.com.tw)。本網站僅供參考,不構成投資建議。
    <span id="upd"></span>
  </footer>
</div>

<script src="assets/app.js"></script>
<script>
(async function(){
  // nav
  const nav=$("#nav");
  CATS.forEach(c=>{ const href = c.id==="stocks" ? "stocks.html" : `detail.html?cat=${c.id}`;
    const a=el("a",null,c.title); a.href=href; a.dataset.k=c.id; nav.appendChild(a); });
  let idx;
  try{ idx=await getJSON("index.json"); }catch(e){ $("#dchip").textContent="無法載入 index.json"; return; }
  const D=idx.latest_date;
  $("#dchip").innerHTML=`資料日期 <b>${D}</b>`;
  $("#upd").textContent = idx.updated_at? ` · 更新時間 ${idx.updated_at.replace("T"," ")}`:"";

  // status warnings
  const st=(idx.status_log&&idx.status_log[D])||{};
  const bad=Object.entries(st).filter(([k,v])=>/未更新|no-data|pending/.test(String(v)));
  if(bad.length){ const w=el("div","warn","部分來源狀態:"+bad.map(([k,v])=>`${k}=${v}`).join("、")); $("#status").appendChild(w); }

  const grid=$("#grid");
  const dates=(idx.dates||[]).slice();     // 已由新到舊排序
  const prevD=dates[1];                    // 前一個交易日
  async function card(c, renderer){
    const div=el("div","card");
    div.appendChild(el("h3",null,`${c.title}<a href="detail.html?cat=${c.id}">歷史 →</a>`));
    div.appendChild(el("div","src","來源:"+(c.src||"")));
    try{
      const doc=await getJSON(c.file);
      const rec=doc.records[D];
      const prev=prevD?doc.records[prevD]:null;
      if(!rec){ div.appendChild(el("div","warn","當日無資料")); }
      else div.appendChild(renderer(rec, prev));
    }catch(e){ div.appendChild(el("div","warn","無法載入")); }
    grid.appendChild(div);
  }
  await card({id:"options_foreign",title:"外資選擇權",file:"options_foreign.json",src:"臺指選擇權·未平倉"}, renderOptions);
  await card({id:"options_dealer", title:"自營選擇權",file:"options_dealer.json",src:"臺指選擇權·未平倉"}, renderOptions);
  await card({id:"foreign_fut_spot",title:"外資期貨、現貨",file:"foreign_fut_spot.json",src:"臺股期貨未平倉+現貨買賣差"}, renderFutSpot);
  await card({id:"large_opt",title:"大額交易人選擇權",file:"large_opt.json",src:"臺指買權/賣權"}, renderLargeOpt);
  await card({id:"large_fut_txf",title:"大額交易人期貨",file:"large_fut_txf.json",src:"臺股期貨 當月+所有契約"}, renderLargeFut);

  // stocks
  $("#stkcount").textContent=(idx.stocks||[]).length+" 檔";
  const sc=$("#stocks");
  (idx.stocks||[]).forEach(s=>{ const a=el("a",null,`<span>${s.name}</span><span class="c">${s.code}·${s.sid||""}</span>`);
    a.href=`stocks.html?code=${s.code}`; sc.appendChild(a); });
})();
</script>
</body>
</html>
