<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>分類明細 — 每日盤後資料</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<header class="top"><div class="wrap">
  <h1><a href="index.html" style="color:inherit">每日盤後資料</a><small>分類明細 · 當日與歷史</small></h1>
  <nav class="main" id="nav"></nav>
</div></header>

<div class="wrap">
  <div class="crumbs"><a href="index.html">← 當日整合總覽</a></div>
  <h2 class="sec" id="title">載入中…</h2>
  <p class="lead" id="src"></p>

  <div class="toolbar">
    <label class="muted">查詢日期</label>
    <select id="dateSel"></select>
    <span class="muted" id="hint"></span>
  </div>
  <div id="detail"></div>

  <h2 class="sec">歷史趨勢 <span class="tag">依日期</span></h2>
  <div id="history"></div>

  <footer>資料來源:臺灣期貨交易所、臺灣證券交易所。歷史資料逐日累積保存 (至少一年)。</footer>
</div>

<script src="assets/app.js"></script>
<script>
(async function(){
  const cat=new URLSearchParams(location.search).get("cat")||"options_foreign";
  const nav=$("#nav");
  CATS.forEach(c=>{const a=el("a",null,c.title);a.href=catHref(c);a.dataset.k=c.id;nav.appendChild(a);});
  navActive(cat);

  if(cat==="stocks"){ location.href="index.html#stocks"; return; }
  const meta=CATS.find(c=>c.id===cat);
  const idx=await getJSON("index.json");
  const doc=await getJSON(meta.file);
  $("#title").textContent=meta.title;
  $("#src").textContent="來源:"+((doc.meta&&doc.meta.source)||"");

  const dates=Object.keys(doc.records).sort().reverse();
  const sel=$("#dateSel");
  dates.forEach(d=>{const o=el("option",null,d);o.value=d;sel.appendChild(o);});

  const renderers={options_foreign:renderOptions,options_dealer:renderOptions,
    foreign_fut_spot:renderFutSpot,large_opt:renderLargeOpt,large_fut_txf:renderLargeFut};
  function showDate(d){
    const box=$("#detail"); box.innerHTML="";
    const rec=doc.records[d];
    if(!rec){box.appendChild(el("div","warn","該日無資料"));return;}
    const i=dates.indexOf(d); const prev=(i>=0&&i+1<dates.length)?doc.records[dates[i+1]]:null;
    box.appendChild(renderers[cat](rec, prev));
  }
  sel.onchange=()=>showDate(sel.value);
  showDate(dates[0]);

  // 歷史趨勢摘要
  function summaryRows(){
    const H={
      options_foreign:[{label:"日期",sort:true},{label:"CALL差額金額(千元)",num:true},{label:"PUT差額金額(千元)",num:true},{label:"CALL買方未平倉",num:true},{label:"PUT買方未平倉",num:true}],
      options_dealer:[{label:"日期",sort:true},{label:"CALL差額金額(千元)",num:true},{label:"PUT差額金額(千元)",num:true},{label:"CALL買方未平倉",num:true},{label:"PUT買方未平倉",num:true}],
      foreign_fut_spot:[{label:"日期",sort:true},{label:"期貨多空淨額(口)",num:true},{label:"現貨買賣差額(元)",num:true}],
      large_opt:[{label:"日期",sort:true},{label:"前十特定法人 CALL淨部位",num:true},{label:"前十特定法人 PUT淨部位",num:true},{label:"CALL全市場未沖銷",num:true}],
      large_fut_txf:[{label:"日期",sort:true},{label:"前十特定法人淨部位",num:true},{label:"前十特定法人多單",num:true},{label:"前十特定法人空單",num:true},{label:"全市場未沖銷",num:true}],
    }[cat];
    const rows=dates.map(d=>{const r=doc.records[d]; const o={"日期":d};
      if(cat.startsWith("options")){o["CALL差額金額(千元)"]=cell(r.call?.diff_oi_amt,true);o["PUT差額金額(千元)"]=cell(r.put?.diff_oi_amt,true);o["CALL買方未平倉"]=cell(r.call?.buy_oi_lots);o["PUT買方未平倉"]=cell(r.put?.buy_oi_lots);}
      else if(cat==="foreign_fut_spot"){o["期貨多空淨額(口)"]=cell(r.fut?.net_oi_lots,true);o["現貨買賣差額(元)"]=cell(r.spot?.net_amt,true);}
      else if(cat==="large_opt"){const g=optGroups(r,"999999");o["前十特定法人 CALL淨部位"]=cell(g.call.rows.inst10.net,true);o["前十特定法人 PUT淨部位"]=cell(g.put.rows.inst10.net,true);o["CALL全市場未沖銷"]=cell(g.call.market);}
      else if(cat==="large_fut_txf"){const g=futSide(r.rows||[],"999999");o["前十特定法人淨部位"]=cell(g.rows.inst10.net,true);o["前十特定法人多單"]=cell(g.rows.inst10.long);o["前十特定法人空單"]=cell(g.rows.inst10.short);o["全市場未沖銷"]=cell(g.market);}
      return o;});
    return {H,rows};
  }
  const {H,rows}=summaryRows();

  /* ---- 歷史趨勢柱狀圖 (表格上方) ---- */
  const numCols=H.filter(h=>h.num).map(h=>h.label);
  let hchart=null;
  if(numCols.length && typeof Chart!=="undefined"){
    const bar=el("div","optbar");
    bar.appendChild(el("span","muted","圖表欄位 "));
    const csel=el("select");
    numCols.forEach(c=>{const o=el("option",null,c);o.value=c;csel.appendChild(o);});
    bar.appendChild(csel);
    $("#history").appendChild(bar);
    const cbox=el("div","hist-canvas"); const cv=document.createElement("canvas");
    cbox.appendChild(cv); $("#history").appendChild(cbox);

    function drawHist(col){
      const asc=rows.slice().sort((a,b)=>String(a["日期"]).localeCompare(String(b["日期"])));
      const labels=asc.map(r=>r["日期"]);
      const vals=asc.map(r=>{const v=r[col]; return (v&&v.raw!==undefined&&v.raw!==null)?Number(v.raw):null;});
      if(hchart){ try{hchart.destroy();}catch(e){} }
      hchart=new Chart(cv.getContext("2d"),{ type:"bar",
        data:{labels,datasets:[{label:col,data:vals,borderWidth:0,
          backgroundColor:vals.map(v=>v==null?"rgba(0,0,0,0)":(v>=0?"rgba(255,91,91,.85)":"rgba(34,197,94,.85)"))}]},
        options:{ responsive:true, maintainAspectRatio:false, animation:false,
          interaction:{mode:"index",intersect:false},
          plugins:{ legend:{display:false},
            tooltip:{callbacks:{label:c=>`${col}: ${Number(c.raw).toLocaleString("en-US")}`}} },
          scales:{ x:{ticks:{color:"#7d8ea0",maxTicksLimit:12,font:{size:9}},grid:{color:"rgba(255,255,255,.04)"}},
                   y:{ticks:{color:"#8aa0b4",font:{size:10}},grid:{color:"rgba(255,255,255,.06)"}} } } });
    }
    csel.onchange=()=>drawHist(csel.value);
    try{ drawHist(numCols[0]); }catch(e){ cbox.appendChild(el("div","warn","圖表載入失敗:"+e.message)); }
  }

  $("#history").appendChild(sortableTable(H,rows));
})();
</script>
</body>
</html>
