<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>分類明細 — 每日盤後資料</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<header class="top"><div class="wrap">
  <h1><a href="index.html" style="color:inherit">每日盤後資料</a><small>分類明細 · 當日與歷史</small></h1>
  <nav class="main" id="nav"></nav>
</div></header>

<div class="wrap">
  <div class="crumbs"><a href="index.html">← 當日整合總覽</a></div>
  <h2 class="sec" id="title">載入中…</h2>
  <p class="lead" id="src"></p>

  <div class="toolbar">
    <label class="muted">查詢日期</label>
    <select id="dateSel"></select>
    <span class="muted" id="hint"></span>
  </div>
  <div id="detail"></div>

  <h2 class="sec">歷史趨勢 <span class="tag">依日期</span></h2>
  <div id="history"></div>

  <footer>資料來源:臺灣期貨交易所、臺灣證券交易所。歷史資料逐日累積保存 (至少一年)。</footer>
</div>

<script src="assets/app.js"></script>
<script>
(async function(){
  const cat=new URLSearchParams(location.search).get("cat")||"options_foreign";
  const nav=$("#nav");
  CATS.forEach(c=>{const a=el("a",null,c.title);a.href=catHref(c);a.dataset.k=c.id;nav.appendChild(a);});
  navActive(cat);

  if(cat==="stocks"){ location.href="index.html#stocks"; return; }
  const meta=CATS.find(c=>c.id===cat);
  const idx=await getJSON("index.json");
  const doc=await getJSON(meta.file);
  $("#title").textContent=meta.title;
  $("#src").textContent="來源:"+((doc.meta&&doc.meta.source)||"");

  const dates=Object.keys(doc.records).sort().reverse();
  const sel=$("#dateSel");
  dates.forEach(d=>{const o=el("option",null,d);o.value=d;sel.appendChild(o);});

  const renderers={options_foreign:renderOptions,options_dealer:renderOptions,
    foreign_fut_spot:renderFutSpot,large_opt:renderLargeOpt,large_fut_txf:renderLargeFut};
  function showDate(d){
    const box=$("#detail"); box.innerHTML="";
    const rec=doc.records[d];
    if(!rec){box.appendChild(el("div","warn","該日無資料"));return;}
    const i=dates.indexOf(d); const prev=(i>=0&&i+1<dates.length)?doc.records[dates[i+1]]:null;
    box.appendChild(renderers[cat](rec, prev));
  }
  sel.onchange=()=>showDate(sel.value);
  showDate(dates[0]);

  // 歷史趨勢摘要
  function summaryRows(){
    const H={
      options_foreign:[{label:"日期",sort:true},{label:"CALL未平倉金額(千元)",num:true},{label:"PUT未平倉金額(千元)",num:true},{label:"CALL買方未平倉",num:true},{label:"PUT買方未平倉",num:true}],
      options_dealer:[{label:"日期",sort:true},{label:"CALL未平倉金額(千元)",num:true},{label:"PUT未平倉金額(千元)",num:true},{label:"CALL買方未平倉",num:true},{label:"PUT買方未平倉",num:true}],
      foreign_fut_spot:[{label:"日期",sort:true},{label:"期貨多空淨額(口)",num:true},{label:"現貨買賣差額(元)",num:true}],
      large_opt:[{label:"日期",sort:true},{label:"前十特定法人 CALL淨部位",num:true},{label:"前十特定法人 PUT淨部位",num:true},{label:"CALL全市場未沖銷",num:true}],
      large_fut_txf:[{label:"日期",sort:true},{label:"前十特定法人淨部位",num:true},{label:"前十特定法人多單",num:true},{label:"前十特定法人空單",num:true},{label:"全市場未沖銷",num:true}],
    }[cat];
    const rows=dates.map(d=>{const r=doc.records[d]; const o={"日期":d};
      if(cat.startsWith("options")){o["CALL未平倉金額(千元)"]=cell(r.call?.diff_oi_amt,true);o["PUT未平倉金額(千元)"]=cell(r.put?.diff_oi_amt,true);o["CALL買方未平倉"]=cell(r.call?.buy_oi_lots);o["PUT買方未平倉"]=cell(r.put?.buy_oi_lots);}
      else if(cat==="foreign_fut_spot"){o["期貨多空淨額(口)"]=cell(r.fut?.net_oi_lots,true);o["現貨買賣差額(元)"]=cell(r.spot?.net_amt,true);}
      else if(cat==="large_opt"){const g=optGroups(r,"999999");o["前十特定法人 CALL淨部位"]=cell(g.call.rows.inst10.net,true);o["前十特定法人 PUT淨部位"]=cell(g.put.rows.inst10.net,true);o["CALL全市場未沖銷"]=cell(g.call.market);}
      else if(cat==="large_fut_txf"){const g=futSide(r.rows||[],"999999");o["前十特定法人淨部位"]=cell(g.rows.inst10.net,true);o["前十特定法人多單"]=cell(g.rows.inst10.long);o["前十特定法人空單"]=cell(g.rows.inst10.short);o["全市場未沖銷"]=cell(g.market);}
      return o;});
    return {H,rows};
  }
  const {H,rows}=summaryRows();

  /* ---- 歷史趨勢柱狀圖 (表格上方): 滾輪縮放 · 按住拖曳平移 · 雙擊重置 ---- */
  const numCols=H.filter(h=>h.num).map(h=>h.label);
  let hchart=null;
  if(numCols.length && typeof Chart!=="undefined"){
    const bar=el("div","optbar");
    bar.appendChild(el("span","muted","圖表欄位 "));
    const csel=el("select");
    numCols.forEach(c=>{const o=el("option",null,c);o.value=c;csel.appendChild(o);});
    bar.appendChild(csel);
    bar.appendChild(el("span","muted","  滾輪縮放期間 · 按住拖曳平移 · 雙擊重置"));
    $("#history").appendChild(bar);
    const cbox=el("div","hist-canvas"); const cv=document.createElement("canvas");
    cbox.appendChild(cv); $("#history").appendChild(cbox);
    cv.style.cursor="grab";

    const asc=rows.slice().sort((a,b)=>String(a["日期"]).localeCompare(String(b["日期"])));
    const allLabels=asc.map(r=>r["日期"]);
    // 台指期近月收盤疊圖 (僅外資/自營選擇權)
    let txf=null;
    if(cat==="options_foreign"||cat==="options_dealer"){
      try{ txf=(await getJSON("txf.json")).records||null; }catch(e){ txf=null; }
    }
    let vA=0, vB=Math.max(0,allLabels.length-1), curCol=numCols[0];
    const SPANMIN=10;
    function clampWin(){
      const n=allLabels.length;
      if(vA<0)vA=0; if(vB>n-1)vB=n-1;
      if(vB-vA+1<SPANMIN){ vB=Math.min(n-1,vA+SPANMIN-1); vA=Math.max(0,vB-SPANMIN+1); }
    }
    function drawHist(){
      const labels=allLabels.slice(vA,vB+1);
      const vals=asc.slice(vA,vB+1).map(r=>{const v=r[curCol]; return (v&&v.raw!==undefined&&v.raw!==null)?Number(v.raw):null;});
      const ds=[{label:curCol,data:vals,borderWidth:0,order:1,
        backgroundColor:vals.map(v=>v==null?"rgba(0,0,0,0)":(v>=0?"rgba(255,91,91,.85)":"rgba(34,197,94,.85)"))}];
      const sc={ x:{ticks:{color:"#c3d2e0",maxTicksLimit:12,font:{size:11}},grid:{color:"rgba(255,255,255,.04)"}},
                 y:{ticks:{color:"#c3d2e0",font:{size:11}},grid:{color:"rgba(255,255,255,.06)"}} };
      if(txf){
        const tv=labels.map(d=>txf[d]!=null?txf[d]:null);
        ds.push({type:"line",label:"台指期收盤(近月)",data:tv,yAxisID:"y1",borderColor:"#f0c85a",
          backgroundColor:"rgba(0,0,0,0)",pointRadius:0,borderWidth:1.6,tension:.15,order:0,spanGaps:true});
        const nums=tv.filter(v=>v!=null);
        if(nums.length){
          const lo=Math.min(...nums), hi=Math.max(...nums);
          const pad=Math.max((hi-lo)*.06, hi*.004);
          sc.y1={position:"right",min:lo-pad,max:hi+pad,ticks:{color:"#f0c85a",font:{size:11}},grid:{drawOnChartArea:false}};
        }
      }
      if(hchart){ try{hchart.destroy();}catch(e){} }
      hchart=new Chart(cv.getContext("2d"),{ type:"bar",
        data:{labels,datasets:ds},
        options:{ responsive:true, maintainAspectRatio:false, animation:false,
          interaction:{mode:"index",intersect:false},
          plugins:{ legend:{display:!!txf,labels:{color:"#c3d2e0",boxWidth:14}},
            tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${Number(c.raw).toLocaleString("en-US")}`}} },
          scales:sc } });
    }
    // 滾輪縮放 (以游標為中心; 座標需除以整頁 zoom 比例)
    cv.addEventListener("wheel",e=>{
      e.preventDefault();
      const rect=cv.getBoundingClientRect();
      const scx=(rect.width>0&&cv.offsetWidth>0)?rect.width/cv.offsetWidth:1;
      const x=(e.clientX-rect.left)/scx;
      const frac=Math.min(1,Math.max(0,x/Math.max(1,cv.offsetWidth)));
      const span=vB-vA+1;
      const ns=Math.max(SPANMIN,Math.min(allLabels.length,Math.round(e.deltaY<0? span*0.8 : span/0.8)));
      const center=vA+frac*(span-1);
      vA=Math.round(center-frac*(ns-1)); vB=vA+ns-1;
      clampWin(); drawHist();
    },{passive:false});
    // 左鍵按住拖曳平移
    let drag=null;
    cv.addEventListener("pointerdown",e=>{ drag={x:e.clientX,a:vA,b:vB}; cv.style.cursor="grabbing"; try{cv.setPointerCapture(e.pointerId);}catch(_e){} });
    cv.addEventListener("pointermove",e=>{
      if(!drag)return;
      const rect=cv.getBoundingClientRect();
      const scx=(rect.width>0&&cv.offsetWidth>0)?rect.width/cv.offsetWidth:1;
      const dx=(e.clientX-drag.x)/scx;
      const span=drag.b-drag.a+1;
      let shift=Math.round(-dx*(span/Math.max(1,cv.offsetWidth)));
      const n=allLabels.length;
      shift=Math.max(-drag.a, Math.min(shift, n-1-drag.b));
      vA=drag.a+shift; vB=drag.b+shift; drawHist();
    });
    const endDrag=()=>{ if(drag){ drag=null; cv.style.cursor="grab"; } };
    cv.addEventListener("pointerup",endDrag); cv.addEventListener("pointercancel",endDrag);
    cv.addEventListener("dblclick",()=>{ vA=0; vB=allLabels.length-1; drawHist(); });
    csel.onchange=()=>{ curCol=csel.value; drawHist(); };
    try{ drawHist(); }catch(e){ cbox.appendChild(el("div","warn","圖表載入失敗:"+e.message)); }
  }

  $("#history").appendChild(sortableTable(H,rows));
})();
</script>
</body>
</html>
