<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>股期增減排行 — 每日盤後資料</title>
<link rel="stylesheet" href="assets/style.css">
<style>
.rank-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:14px}
@media (max-width:900px){.rank-grid{grid-template-columns:1fr}}
.rank-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.rank-card h3{margin:0 0 10px;font-size:15.5px}
.rank-card h3 small{color:var(--mut);font-weight:400;margin-left:6px;font-size:12px}
table.rank{width:100%;border-collapse:collapse;font-size:14px}
table.rank td{padding:6px 6px;border-bottom:1px solid rgba(255,255,255,.05)}
table.rank tr:last-child td{border-bottom:none}
td.no{color:var(--mut);width:26px}
td.nm a{color:var(--txt)}
td.nm a:hover{color:var(--accent)}
td.val{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
td.amt{text-align:right;color:var(--mut);font-size:12.5px;white-space:nowrap}
.mini-tag{display:inline-block;background:var(--card2);border:1px solid var(--line);color:var(--mut);font-size:11px;border-radius:5px;padding:0 5px;margin-left:6px;vertical-align:1px}
td.cpt{width:1%;white-space:nowrap;padding-left:0}
.cpt-tag{display:inline-block;border:1px solid #3a5069;background:rgba(78,161,255,.08);color:#9fc3e8;font-size:11px;border-radius:5px;padding:0 6px;max-width:96px;overflow:hidden;text-overflow:ellipsis;vertical-align:middle;cursor:pointer}
a.cpt-tag:hover{border-color:var(--accent);color:var(--accent)}
.empty{color:var(--mut);font-size:13px;padding:8px 2px}
</style>
</head>
<body>
<header class="top"><div class="wrap">
  <h1><a href="index.html" style="color:inherit">每日盤後資料</a><small>股票期貨 · 增減排行</small></h1>
  <nav class="main" id="nav"></nav>
</div></header>

<div class="wrap">
  <div class="crumbs"><a href="index.html">← 當日整合總覽</a></div>
  <h2 class="sec">股票期貨增減排行 <span class="tag" id="dchip"></span></h2>
  <p class="lead">與前一交易日相比的未平倉<b>淨部位</b>增減。金額 = 增減口數 × 近月股期收盤價(缺漏以現股價替代)× 每口股數(小型 100 股、一般 2,000 股)。點股票名稱可查看該檔完整資料。</p>

  <div class="toolbar">
    <label class="muted">大額交易人</label>
    <label class="ck"><input type="radio" name="rk" id="rk10" checked><span>前十大</span></label>
    <label class="ck"><input type="radio" name="rk" id="rk5"><span>前五大</span></label>
    <label class="muted" style="margin-left:10px">口徑</label>
    <select id="metric">
      <option value="main" selected>主力(自然人−法人)</option>
      <option value="t0">交易人合計(原始值)</option>
      <option value="inst">法人(特定法人)</option>
      <option value="nat">自然人(非法人)</option>
      <option value="moi">全市場未沖銷</option>
    </select>
  </div>
  <div class="warn" id="rk5warn" style="display:none">前五大資料將於下一次每日更新後提供,暫以前十大顯示。</div>

  <div class="rank-grid">
    <div class="rank-card"><h3>增加口數 前十<small>口</small></h3><div id="upLots"></div></div>
    <div class="rank-card"><h3>減少口數 前十<small>口</small></h3><div id="dnLots"></div></div>
    <div class="rank-card"><h3>增加金額 前十<small>口數×股價×每口股數</small></h3><div id="upAmt"></div></div>
    <div class="rank-card"><h3>減少金額 前十<small>口數×股價×每口股數</small></h3><div id="dnAmt"></div></div>
  </div>

  <footer>資料來源:臺灣期貨交易所、臺灣證券交易所、證券櫃檯買賣中心。本網站僅供參考,不構成投資建議。</footer>
</div>

<script src="assets/app.js"></script>
<script>
(async function(){
  const nav=$("#nav");
  CATS.forEach(c=>{const a=el("a",null,c.title);a.href=catHref(c);a.dataset.k=c.id;nav.appendChild(a);});
  navActive("rank");

  let rk;
  try{ rk=await getJSON("rank.json"); }
  catch(e){ $("#dchip").textContent="排行資料尚未產生(首次於下一次每日更新後出現)"; return; }

  // 概念股/子產業分類 (整理自財報狗產業地圖, 依證券代號對照; 滑鼠移到框框上顯示全部分類)
  let CPT={}; try{ CPT=await getJSON("concepts.json"); }catch(e){}
  const SHORT={"金控業/銀行業/保險業":"金控/銀行","電腦及週邊設備":"電腦週邊","海陸空大眾運輸":"大眾運輸","整車組裝、修理及技術服務":"整車組裝","成衣及其它家居紡織類品":"成衣家紡","IP設計/IC設計代工服務":"IP/IC設計","硬板、軟板、IC載板製造":"PCB製造","散熱片、風扇馬達、散熱模組":"散熱模組","其他電腦及週邊設備之零組件":"電腦零組件","其他電腦及週邊設備":"電腦週邊","生產製程及檢測設備":"半導體設備","連接器設計、組裝及製造":"連接器","其他電子產品及電子服務產業":"其他電子","其他IC/二極體製造":"二極體","隱型眼鏡、光學鏡片":"光學鏡片","體溫計、血壓計":"醫療器材","紙漿、紙類原料":"紙漿原料","中、西藥製劑":"藥品製劑","濾波器、振盪器":"被動元件","光學鏡片、鏡頭":"光學鏡頭","五金元件及零配件":"五金零件","石化及塑橡膠":"塑化","電池 (能源元件)":"電池","主/被動元件":"通訊元件","電信服務業":"電信","LED 照明":"LED"};
  const cptTag=r=>{
    const c=r.sid?CPT[r.sid]:null; if(!c||!c.m) return null;
    const s=el("a","cpt-tag", SHORT[c.m]||c.m);   // 點擊 → 同概念股總覽
    s.href=`concept.html?tag=${encodeURIComponent(c.m)}`;
    s.title=(c.t||[]).join("、")+"(點擊查看同概念股期)";
    return s;
  };
  $("#dchip").innerHTML=`資料日期 <b>${rk.date}</b> · 對照前一交易日${UPDATE_NOTE}`;
  try{ const m=localStorage.getItem("dpm.rank.metric"); if(m&&$("#metric").querySelector(`option[value=${m}]`)) $("#metric").value=m; }catch(e){}
  try{ if(localStorage.getItem("dpm.rank.rk")==="5") $("#rk5").checked=true; }catch(e){}

  // rank.json 原始值: main/inst=前十大(t0/t1), main5/inst5=前五大 — 由前端依選擇換算。
  // 顯示口徑與個股頁/XQ一致: 自然人 = t0−t1, 主力 = 自然人−法人 = t0−2×t1。
  const RK=()=>$("#rk5").checked?5:10;
  const has5=(rk.rows||[]).some(r=>r.main5!=null);
  function vals(r){
    if(RK()===5&&has5) return {t0:r.main5,t0p:r.main5_prev,t1:r.inst5,t1p:r.inst5_prev};
    return {t0:r.main,t0p:r.main_prev,t1:r.inst,t1p:r.inst_prev};
  }
  function delta(r,m){
    let cur=null, prev=null;
    const {t0,t0p,t1,t1p}=vals(r);
    const ok=(a,b)=>a!=null&&b!=null;
    if(m==="main"){ cur=ok(t0,t1)? t0-2*t1:null; prev=ok(t0p,t1p)? t0p-2*t1p:null; }
    else if(m==="t0"){ cur=t0; prev=t0p; }
    else if(m==="inst"){ cur=t1; prev=t1p; }
    else if(m==="nat"){ cur=ok(t0,t1)? t0-t1:null; prev=ok(t0p,t1p)? t0p-t1p:null; }
    else{ cur=r.moi; prev=r.moi_prev; }
    return (cur!=null&&prev!=null)? cur-prev : null;
  }
  const amtStr=v=>{
    const a=Math.abs(v);
    if(a>=1e8) return (v/1e8).toFixed(2)+" 億";
    return (v/1e4).toFixed(0)+" 萬";
  };
  function tableOf(rows, withAmt){
    if(!rows.length) return el("div","empty","本日無符合項目");
    const t=el("table","rank"); const tb=el("tbody"); t.appendChild(tb);
    rows.forEach((r,i)=>{
      const tr=el("tr");
      tr.appendChild(el("td","no",String(i+1)));
      const cp=el("td","cpt"); const tag=cptTag(r); if(tag) cp.appendChild(tag); tr.appendChild(cp);
      const nm=el("td","nm");
      const a=el("a",null,r.name); a.href=`stocks.html?code=${r.code}`;
      nm.appendChild(a);
      if(r.mini) nm.appendChild(el("span","mini-tag","小型"));
      tr.appendChild(nm);
      const d=r._d;
      tr.appendChild(el("td","val",`<span class="${d>0?'up':'down'}">${d>0?"+":""}${Number(d).toLocaleString("en-US")} 口</span>`));
      if(withAmt) tr.appendChild(el("td","amt", r._amt!=null ? amtStr(r._amt) : "—"));
      tb.appendChild(tr);
    });
    return t;
  }
  function render(){
    const m=$("#metric").value;
    $("#rk5warn").style.display=(RK()===5&&!has5)?"block":"none";
    const rows=(rk.rows||[]).map(r=>{
      const d=delta(r,m);
      const px=r.fprice!=null? r.fprice : r.price;   // 股期近月價優先, 缺漏退回現股價
      return d==null?null:{...r,_d:d,_amt:(px!=null? d*px*r.shares : null)};
    }).filter(Boolean);
    const put=(id,arr,withAmt)=>{const b=$("#"+id);b.innerHTML="";b.appendChild(tableOf(arr,withAmt));};
    put("upLots", rows.filter(r=>r._d>0).sort((a,b)=>b._d-a._d).slice(0,10), false);
    put("dnLots", rows.filter(r=>r._d<0).sort((a,b)=>a._d-b._d).slice(0,10), false);
    const amt=rows.filter(r=>r._amt!=null);
    put("upAmt", amt.filter(r=>r._amt>0).sort((a,b)=>b._amt-a._amt).slice(0,10), true);
    put("dnAmt", amt.filter(r=>r._amt<0).sort((a,b)=>a._amt-b._amt).slice(0,10), true);
  }
  $("#metric").onchange=()=>{ try{ localStorage.setItem("dpm.rank.metric", $("#metric").value); }catch(e){} render(); };
  [$("#rk5"),$("#rk10")].forEach(x=>x.onchange=()=>{ try{ localStorage.setItem("dpm.rank.rk", String(RK())); }catch(e){} render(); });
  render();
})();
</script>
</body>
</html>
