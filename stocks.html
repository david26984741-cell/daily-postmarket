<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>股票期貨 — 大額交易人 主力/自然人/特定法人</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<header class="top"><div class="wrap">
  <h1><a href="index.html" style="color:inherit">每日盤後資料</a><small>大額交易人 · 股票期貨</small></h1>
  <nav class="main" id="nav"></nav>
</div></header>

<div class="wrap">
  <div class="crumbs"><a href="index.html">← 當日整合總覽</a></div>
  <h2 class="sec">大額交易人股票期貨 <span class="tag" id="dchip"></span></h2>
  <p class="lead">區域圖=淨部位。<br>柱狀圖=每日增減。</p>

  <div class="stk-toolbar">
    <span class="tlabel">顯示</span>
    <label class="ck" title="前十大交易人合計淨部位(含法人與自然人大戶)"><input type="checkbox" id="ck0" checked><span>交易人</span></label>
    <label class="ck" title="自然人 − 法人:大戶自然人與特定法人的淨差(同XQ主力口徑)"><input type="checkbox" id="ck1" checked><span>主力</span></label>
    <label class="ck" title="前十大交易人合計 − 特定法人:前十大中的自然人大戶"><input type="checkbox" id="ck2" checked><span>自然人</span></label>
    <label class="ck" title="前十大特定法人(銀行、券商、外資機構等)"><input type="checkbox" id="ck3" checked><span>法人</span></label>
    <a class="tlabel" href="help.html" style="opacity:.8">名詞解釋?</a>
  </div>

  <div class="stk-toolbar">
    <span class="tlabel">圖表</span>
    <label class="ck" title="該股期對應現股的日K(開高低收),紅漲綠跌"><input type="checkbox" id="gK" checked><span>K棒(股價)</span></label>
    <label class="ck" title="未平倉淨部位 = 買方 − 賣方(口),紅=淨多、綠=淨空"><input type="checkbox" id="gArea" checked><span>區域圖(淨部位)</span></label>
    <label class="ck" title="淨部位與前一交易日的差,紅柱=增加、綠柱=減少"><input type="checkbox" id="gBar" checked><span>柱狀圖(每日增減)</span></label>
    <label class="ck" title="以近月收盤價換算:持有規模=淨部位×價格×每口股數(小型100股、一般2,000股),顯示於各面板標題"><input type="checkbox" id="gAmt" checked><span>持有規模</span></label>
    <span class="tlabel" style="margin-left:10px">每列</span>
    <select id="cols">
      <option value="1">1 檔</option>
      <option value="2">2 檔</option>
      <option value="3">3 檔</option>
    </select>
  </div>

  <div class="stk-toolbar">
    <span class="tlabel">期間</span>
    <input type="date" id="dFrom" style="padding:6px 8px;font-size:13px">
    <span class="tlabel">→</span>
    <input type="date" id="dTo" style="padding:6px 8px;font-size:13px">
    <button class="ghost rng" data-m="1">近1月</button>
    <button class="ghost rng" data-m="3">近3月</button>
    <button class="ghost rng" data-m="6">近6月</button>
    <button class="ghost rng" data-m="0">全部</button>
    <span class="tlabel" style="opacity:.75">滾輪縮放期間 · 按住拖曳平移 · 雙擊開啟查價十字線</span>
  </div>

  <div class="stk-toolbar">
    <input id="q" list="stocklist" placeholder="可一次輸入多檔,以空白或逗號分隔:2330 2317 鴻海 CD" autocomplete="off">
    <datalist id="stocklist"></datalist>
    <button id="addBtn">加入</button>
    <button id="pickBtn" class="ghost">從清單勾選 ▾</button>
    <button id="clearBtn" class="ghost">清除全部</button>
  </div>

  <div class="picker" id="picker" hidden>
    <input id="pf" placeholder="篩選代號或名稱…" autocomplete="off">
    <div class="picker-grid" id="pg"></div>
  </div>

  <div class="chips" id="chips"></div>

  <div id="blocks" class="stk-blocks"></div>
  <div id="empty" class="lead" style="margin-top:20px">上方搜尋、或從清單勾選一檔以上個股,即可比較。</div>

  <footer>資料來源:臺灣期貨交易所。淨部位=買方−賣方(口)。本網站僅供參考,不構成投資建議。</footer>
</div>

<script src="assets/app.js"></script>
<script>
(async function(){
  const nav=$("#nav");
  CATS.forEach(c=>{ const a=el("a",null,c.title); a.href=catHref(c); a.dataset.k=c.id; nav.appendChild(a); });
  navActive("stocks");

  const idx=await getJSON("index.json");
  $("#dchip").innerHTML = idx.latest_date? `資料日期 <b>${idx.latest_date}</b> · 共 ${(idx.stocks||[]).length} 檔${UPDATE_NOTE}`:"";
  const stocks=idx.stocks||[];
  const byCode={}; stocks.forEach(s=>byCode[s.code]=s);

  const dl=$("#stocklist");
  stocks.forEach(s=>{ const o=el("option"); o.value=`${s.code}  ${s.name}  ${s.sid||""}`; dl.appendChild(o); });

  function findStock(q){
    q=(q||"").trim(); if(!q) return null;
    const first=q.split(/\s+/)[0];
    if(byCode[first]) return byCode[first];
    if(byCode[q]) return byCode[q];
    let s=stocks.find(x=>x.name===q || x.sid===q); if(s) return s;
    const ql=q.toLowerCase();
    return stocks.find(x=> x.code.toLowerCase()===ql) ||
           stocks.find(x=> x.name.includes(q) || (x.sid&&x.sid.includes(q)) || x.code.toLowerCase().includes(ql));
  }

  // ---- 資料轉換 -------------------------------------------------------------
  const NET=(rows,t)=>{ const r=(rows||[]).find(x=>x.month==="999999"&&x.type===t); return r?(r.top10_buy-r.top10_sell):null; };
  function series(doc){
    const dates=Object.keys(doc.records).sort();
    const o={dates, 交易人:{lv:[],ch:[]}, 主力:{lv:[],ch:[]}, 自然人:{lv:[],ch:[]}, 特定法人:{lv:[],ch:[]}}; const prev={};
    dates.forEach(d=>{
      const rows=doc.records[d]; const t0=NET(rows,"0"), t1=NET(rows,"1");
      const inst=t1;
      const nat=(t0!=null&&t1!=null)? t0-t1 : null;
      const main=(nat!=null&&inst!=null)? nat-inst : null;
      [["交易人",t0],["主力",main],["自然人",nat],["特定法人",inst]].forEach(([k,v])=>{
        o[k].lv.push(v); o[k].ch.push((prev[k]!=null&&v!=null)? v-prev[k] : null); prev[k]=v; });
    });
    return o;
  }

  const LINE="#4ea1ff";                       // 各項目的淨部位線統一顏色
  const PANELS=["交易人","主力","自然人","特定法人"];
  const CKS=[$("#ck0"),$("#ck1"),$("#ck2"),$("#ck3")];
  const visiblePanels=()=>PANELS.filter((_,i)=>CKS[i].checked);
  const showArea=()=>$("#gArea").checked, showBar=()=>$("#gBar").checked, showK=()=>$("#gK").checked;
  function last(a){ for(let i=a.length-1;i>=0;i--) if(a[i]!=null) return a[i]; return null; }

  // ---- 顯示期間 (全域, 所有圖表同步) ----------------------------------------
  const range={from:null,to:null};                         // "YYYY/MM/DD"; null=不限
  const allDates=(idx.dates||[]).slice().sort();           // 舊→新 主時間軸
  const d2i=s=>s?s.replaceAll("/","-"):"";                 // 資料日期 → <input type=date>
  const i2d=s=>s?s.replaceAll("-","/"):null;               // <input type=date> → 資料日期
  const inRange=d=>(!range.from||d>=range.from)&&(!range.to||d<=range.to);
  const barColor=v=>v==null?"rgba(0,0,0,0)":(v>=0?"rgba(255,91,91,.85)":"rgba(34,197,94,.85)");
  function visWin(D){                                      // 該圖日期軸上目前可視的 [起,迄] 索引
    let a=0,b=D.length-1;
    while(a<=b&&!inRange(D[a]))a++;
    while(b>=a&&!inRange(D[b]))b--;
    if(a>b){a=0;b=D.length-1;}
    return [a,b];
  }
  function viewSlice(dates,lv,ch){
    const [a,b]=visWin(dates);
    return {labels:dates.slice(a,b+1), lv:lv.slice(a,b+1), ch:ch.slice(a,b+1)};
  }
  function syncRangeInputs(){
    $("#dFrom").value=d2i(range.from||allDates[0]||"");
    $("#dTo").value=d2i(range.to||allDates[allDates.length-1]||"");
  }
  function applyRange(){
    if(range.from&&range.to&&range.from>range.to){const t=range.from;range.from=range.to;range.to=t;}
    syncRangeInputs();
    charts.forEach(r=>{
      if(r.kind==="k"){ applyK(r); return; }
      const v=viewSlice(r.dates,r.lv,r.ch);
      r.chart.data.labels=v.labels;
      r.chart.data.datasets.forEach(ds=>{
        if(ds.type==="line") ds.data=v.lv;
        else { ds.data=v.ch; ds.backgroundColor=v.ch.map(barColor); }
      });
      r.chart.update("none");
    });
    savePrefs();
  }
  function wheelZoom(reg,ev){
    ev.preventDefault();
    const D=reg.dates; if(D.length<2) return;
    const [a,b]=visWin(D), span=b-a+1;
    const cvEl=ev.currentTarget, area=reg.chart.chartArea, rect=cvEl.getBoundingClientRect();
    const sc=(rect.width>0&&cvEl.offsetWidth>0)?rect.width/cvEl.offsetWidth:1;   // 頁面 zoom 校正
    const x=(ev.clientX-rect.left)/sc;
    const ratio=area&&area.width>0 ? Math.min(1,Math.max(0,(x-area.left)/area.width))
                                   : Math.min(1,Math.max(0,x/(cvEl.offsetWidth||rect.width)));
    const anchor=a+Math.round(ratio*(span-1));             // 以游標位置為錨點
    const f=ev.deltaY<0?0.8:1.25;                          // 上滾=放大, 下滾=縮小
    let ns=Math.min(D.length, Math.max(10, Math.round(span*f)));
    let na=Math.max(0, Math.min(anchor-Math.round(ratio*(ns-1)), D.length-ns));
    range.from=D[na]; range.to=D[na+ns-1];
    applyRange();
  }
  function attachPan(reg,cv){                              // 按住拖曳 → 左右平移時間窗
    let drag=null;
    cv.style.cursor="grab";
    cv.style.touchAction="pan-y";                          // 觸控裝置仍可垂直捲頁
    cv.addEventListener("pointerdown",ev=>{
      if(ev.button!==0) return;
      const D=reg.dates; if(D.length<2) return;
      const [a,b]=visWin(D);
      if(b-a+1>=D.length) return;                          // 顯示全區間時無可平移
      const area=reg.chart.chartArea, rect=cv.getBoundingClientRect();
      const sc=(rect.width>0&&cv.offsetWidth>0)?rect.width/cv.offsetWidth:1;    // 頁面 zoom 校正
      const w=((area&&area.width>0)?area.width:(cv.offsetWidth||rect.width))*sc; // 以螢幕像素計
      drag={x0:ev.clientX, a, b, ppd:w/(b-a+1)};           // ppd = 每個交易日佔的螢幕像素
      try{ cv.setPointerCapture(ev.pointerId); }catch(e){}
      cv.style.cursor="grabbing";
      ev.preventDefault();
    });
    cv.addEventListener("pointermove",ev=>{
      if(!drag) return;
      const D=reg.dates, span=drag.b-drag.a+1;
      const shift=Math.round((ev.clientX-drag.x0)/drag.ppd); // 往右拖 = 看更早
      let na=Math.max(0, Math.min(drag.a-shift, D.length-span));
      if(D[na]===range.from) return;
      range.from=D[na]; range.to=D[na+span-1];
      applyRange();
    });
    const endDrag=()=>{ if(drag){ drag=null; cv.style.cursor="grab"; } };
    cv.addEventListener("pointerup",endDrag);
    cv.addEventListener("pointercancel",endDrag);
  }

  // ---- 日K (現貨股價) — 以浮動長條繪製蠟燭, 與 category 軸/縮放/拖曳完全相容 ----
  const UPC="rgba(255,91,91,.95)", DNC="rgba(34,197,94,.95)", NOC="rgba(0,0,0,0)";
  const AXW=64;   // 固定座標軸寬度: 所有面板繪圖區等寬, 十字線與K棒/籌碼逐日筆直對齊
  const TKC="#c3d2e0";   // 軸刻度文字 (時間/數值) — 加大加亮
  const TKF={size:11};
  const fitW=s=>{ s.width=AXW; };
  function kSlice(r){
    const [a,b]=visWin(r.dates);
    const labels=r.dates.slice(a,b+1), body=[], wick=[], cols=[], O=[],H=[],L=[],C=[];
    for(let i=a;i<=b;i++){
      const o=r.O[i],h=r.H[i],l=r.L[i],c=r.C[i];
      O.push(o);H.push(h);L.push(l);C.push(c);
      if(o==null||h==null||l==null||c==null){ body.push(null); wick.push(null); cols.push(NOC); continue; }
      const lo=Math.min(o,c), hi=Math.max(o,c);
      body.push(hi-lo<1e-9 ? [lo, lo+Math.max(hi*0.0008,0.01)] : [lo,hi]);
      wick.push([l,h]);
      cols.push(c>=o?UPC:DNC);
    }
    return {labels, body, wick, cols, O,H,L,C};
  }
  // K棒Y軸貼合可視區間價格 (仿XQ): 不從0開始, 短天期K棒不會被壓扁
  function kYRange(v){
    let lo=Infinity, hi=-Infinity;
    for(let i=0;i<v.L.length;i++){
      if(v.L[i]!=null&&v.L[i]<lo) lo=v.L[i];
      if(v.H[i]!=null&&v.H[i]>hi) hi=v.H[i];
    }
    if(!(hi>=lo)) return [undefined,undefined];
    const pad=Math.max((hi-lo)*0.06, hi*0.004);
    return [Math.max(0,lo-pad), hi+pad];
  }
  function applyK(r){
    const v=kSlice(r);
    r.chart.data.labels=v.labels;
    r.chart.data.datasets[0].data=v.body;
    r.chart.data.datasets[0].backgroundColor=v.cols;
    r.chart.data.datasets[1].data=v.wick;
    r.chart.data.datasets[1].backgroundColor=v.cols;
    const [ylo,yhi]=kYRange(v);
    r.chart.options.scales.y.min=ylo; r.chart.options.scales.y.max=yhi;
    r.chart.$k=v;
    r.chart.update("none");
  }
  function makeKChart(ctx,r){
    const v=kSlice(r);
    const [ylo,yhi]=kYRange(v);
    const chart=new Chart(ctx,{ data:{labels:v.labels, datasets:[
      {type:"bar",label:"K",data:v.body,backgroundColor:v.cols,grouped:false,barPercentage:.72,categoryPercentage:1,order:1,borderWidth:0},
      {type:"bar",label:"影線",data:v.wick,backgroundColor:v.cols,grouped:false,barPercentage:.12,categoryPercentage:1,order:2,borderWidth:0},
    ]},
    options:{ responsive:true, maintainAspectRatio:false, animation:false, interaction:{mode:"index",intersect:false},
      layout:{ padding:{ left:AXW } },
      // 內建 tooltip 不支援整頁 zoom 縮放, 座標會偏移且蓋住K棒 → 停用, 一律以查價視窗為準
      plugins:{ legend:{display:false}, tooltip:{enabled:false} },
      scales:{ x:{ ticks:{color:TKC,maxTicksLimit:8,font:TKF}, grid:{color:"rgba(255,255,255,.04)"} },
               y:{ position:"right", afterFit:fitW, min:ylo, max:yhi, ticks:{color:TKC,font:TKF}, grid:{color:"rgba(255,255,255,.06)"} } } } });
    chart.$k=v;
    return chart;
  }

  function makeChart(ctx,dates,lv,ch,hideX){
    const v=viewSlice(dates,lv,ch);
    // hideX=true: 籌碼面板不重複顯示日期軸 (K棒面板已有時間), 版面更緊湊
    const ds=[], sc={ x:{ ticks:{color:TKC,maxTicksLimit:8,font:TKF,display:!hideX}, grid:{color:"rgba(255,255,255,.04)"} } };
    // 軸配置: 淨部位(線)→左軸、每日增減(柱)→右軸
    if(showArea()){
      ds.push({type:"line",label:"淨部位",data:v.lv,yAxisID:"y",borderColor:LINE,backgroundColor:LINE+"22",fill:"origin",pointRadius:0,borderWidth:1.6,tension:.15,order:2,spanGaps:true});
      sc.y={ position:"left", afterFit:fitW, beginAtZero:true, ticks:{color:TKC,font:TKF}, grid:{color:"rgba(255,255,255,.06)"} };
    }
    const both=showArea()&&showBar();
    if(showBar()){
      ds.push({type:"bar",label:"每日增減",data:v.ch,yAxisID:both?"y1":"y",order:1,borderWidth:0,
        backgroundColor:v.ch.map(barColor)});
      if(both) sc.y1={ position:"right", afterFit:fitW, beginAtZero:true, ticks:{color:TKC,font:TKF}, grid:{drawOnChartArea:false} };
      else sc.y={ position:"right", afterFit:fitW, beginAtZero:true, ticks:{color:TKC,font:TKF}, grid:{color:"rgba(255,255,255,.06)"} };
    }
    return new Chart(ctx,{ data:{labels:v.labels,datasets:ds},
      options:{ responsive:true, maintainAspectRatio:false, animation:false, interaction:{mode:"index",intersect:false},
      layout: both? undefined : (showArea()? { padding:{ right:AXW } } : { padding:{ left:AXW } }),
      plugins:{ legend:{display:false}, tooltip:{enabled:false} },
      scales:sc } });
  }

  // ---- 狀態 -----------------------------------------------------------------
  const selected=[];   // 已選代號 (依加入順序)
  const docs={};       // code -> json (快取, 不重複下載)
  const klines={};     // sid -> 現股日K json (快取; null=無資料, 作為股期報價缺漏時的備援)
  const fklines={};    // code -> 股期近月日K json (期交所行情, 優先使用)

  // ---- 偏好記憶 (localStorage): 選股組合/期間/口徑/圖表設定, 回訪自動恢復 ----
  const PREFS="dpm.stocks.prefs2";   // v2: 面板改四口徑(交易人/主力/自然人/法人)
  function savePrefs(){
    try{
      localStorage.setItem(PREFS, JSON.stringify({
        codes:selected.slice(), from:range.from, to:range.to,
        ck:[CKS[0].checked,CKS[1].checked,CKS[2].checked],
        gK:$("#gK").checked, gArea:$("#gArea").checked, gBar:$("#gBar").checked, gAmt:$("#gAmt").checked,
        cols:$("#cols").value
      }));
    }catch(e){}
  }
  function loadPrefs(){
    try{ return JSON.parse(localStorage.getItem(PREFS)||"null"); }catch(e){ return null; }
  }
  let charts=[];
  const blocks=$("#blocks"), chipsEl=$("#chips"), emptyEl=$("#empty");

  function render(){
    charts.forEach(r=>{ try{r.chart.destroy();}catch(e){} }); charts=[];
    blocks.innerHTML="";
    const cols=parseInt($("#cols").value,10)||1;
    blocks.style.gridTemplateColumns=`repeat(${cols},minmax(0,1fr))`;
    const chartH = cols===1? 200 : (cols===2? 160 : 130);
    const vis=visiblePanels();
    emptyEl.style.display = selected.length? "none":"block";
    if(selected.length && !vis.length && !showK()){
      blocks.appendChild(el("div","warn","請至少勾選一項:主力 / 自然人 / 法人 (或 K棒)")); return;
    }
    if(selected.length && !showArea() && !showBar() && !showK()){
      blocks.appendChild(el("div","warn","請至少勾選一種圖表:K棒、區域圖 或 柱狀圖")); return;
    }
    const showPos = vis.length && (showArea()||showBar());   // 是否繪製部位面板
    selected.forEach(code=>{
      const doc=docs[code]; const s=byCode[code]||{code,name:code};
      const blk=el("div","stk-block"); blk.id="blk-"+code;
      const titleEl=el("div","stk-title",`${s.name} <span class="c">${code} · ${s.sid||""}</span>`);
      blk.appendChild(titleEl);
      if(!doc){ blk.appendChild(el("div","warn","找不到此個股資料")); blocks.appendChild(blk); return; }

      const body=el("div","stk-body");   // 每檔一列, 內部項目由上而下各佔一列
      const ser=series(doc);
      const fkd=(fklines[code]&&fklines[code].records&&Object.keys(fklines[code].records).length)?fklines[code]:null;
      const kd=fkd||((s.sid&&klines[s.sid]&&klines[s.sid].records)?klines[s.sid]:null);
      const isF=!!fkd;   // true=股期報價(期交所), false=現股報價(備援)

      // ---- 共同日期軸: K棒與各籌碼面板逐日對齊 ----
      const dset=new Set(ser.dates);
      if(kd) for(const d in kd.records){ const r=kd.records[d]; if(r&&r[3]!=null) dset.add(d); }
      const M=[...dset].sort();
      const mI={}; M.forEach((d,i)=>{ mI[d]=i; });
      const mapArr=(dates,arr)=>{ const o=new Array(M.length).fill(null); dates.forEach((d,i)=>{ o[mI[d]]=arr[i]; }); return o; };
      let KO=null,KH=null,KL=null,KC=null;
      if(kd){
        KO=new Array(M.length).fill(null); KH=new Array(M.length).fill(null);
        KL=new Array(M.length).fill(null); KC=new Array(M.length).fill(null);
        M.forEach((d,i)=>{ const r=kd.records[d]; if(r){ KO[i]=r[0]; KH[i]=r[1]; KL[i]=r[2]; KC[i]=r[3]; } });
      }
      const PS={}; PANELS.forEach(k=>{ PS[k]={lv:mapArr(ser.dates,ser[k].lv), ch:mapArr(ser.dates,ser[k].ch)}; });

      // ---- 查價視窗 + 十字線 (雙擊任一圖開啟/關閉, 滑鼠移動對準日期) ----
      const qbox=el("div","quote-box"); blk.appendChild(qbox);
      const bRegs=[];
      let qOn=false;
      const fq=(v,dec)=>v==null?"—":Number(v).toLocaleString("en-US",{maximumFractionDigits:dec===undefined?2:dec});
      const cCls=v=>v>0?"up":(v<0?"down":"");
      function quoteHide(){ qbox.style.display="none"; bRegs.forEach(o=>{ o.xv.style.display="none"; o.xh.style.display="none"; }); }
      function quoteShow(i, activeCv, yPx){
        const d=M[i]; if(!d){ quoteHide(); return; }
        let h=`<table><tr class="qb-t"><td>時間</td><td>${d}</td></tr>`;
        if(KC){
          let pc=null; for(let j=i-1;j>=0;j--){ if(KC[j]!=null){ pc=KC[j]; break; } }
          h+=`<tr><td>開</td><td>${fq(KO[i])}</td></tr><tr><td>高</td><td>${fq(KH[i])}</td></tr><tr><td>低</td><td>${fq(KL[i])}</td></tr><tr><td>收</td><td>${fq(KC[i])}</td></tr>`;
          if(KC[i]!=null&&pc!=null){ const chg=KC[i]-pc;
            h+=`<tr><td>漲跌</td><td class="${cCls(chg)}">${(chg>=0?"+":"")+chg.toFixed(2)}</td></tr>`;
            h+=`<tr><td>漲跌幅</td><td class="${cCls(chg)}">${((chg/pc)*100).toFixed(2)}%</td></tr>`; }
        }
        h+="</table>";
        // 主力/自然人/法人 各自一個小外框, 判讀更直覺
        PANELS.forEach(k=>{
          const nm=k==="特定法人"?"法人":k, lv=PS[k].lv[i], ch=PS[k].ch[i];
          h+=`<div class="qb-grp"><table>`+
             `<tr><td>${nm}淨部位</td><td class="${cCls(lv)}">${fq(lv,0)}</td></tr>`+
             `<tr><td>${nm}增減</td><td class="${cCls(ch)}">${ch==null?"—":(ch>0?"+":"")+fq(ch,0)}</td></tr>`+
             `</table></div>`;
        });
        qbox.innerHTML=h; qbox.style.display="block";
        const [a,b]=visWin(M);
        // 查價視窗自動換邊: 游標在左半邊 → 視窗靠右, 反之靠左, 永不遮住查看中的K棒
        if(bRegs.length){
          const r0=bRegs[0], rr=r0.cv.getBoundingClientRect(), br=blk.getBoundingClientRect();
          const scq=(rr.width>0&&r0.cv.offsetWidth>0)?rr.width/r0.cv.offsetWidth:1;
          const ci=Math.max(a,Math.min(i,b));
          const xAbs=rr.left + r0.reg.chart.scales.x.getPixelForValue(ci-a)*scq;
          if(xAbs < br.left + br.width/2){ qbox.style.left="auto"; qbox.style.right="14px"; }
          else{ qbox.style.right="auto"; qbox.style.left="14px"; }
        }
        bRegs.forEach(o=>{
          if(i<a||i>b){ o.xv.style.display="none"; o.xh.style.display="none"; return; }
          const x=o.reg.chart.scales.x.getPixelForValue(i-a);
          o.xv.style.left=x+"px"; o.xv.style.display="block";
          if(o.cv===activeCv&&yPx!=null){ o.xh.style.top=yPx+"px"; o.xh.style.display="block"; }
          else o.xh.style.display="none";
        });
      }
      function quoteMove(reg,cv,ev){
        const rect=cv.getBoundingClientRect();
        const sc=(rect.width>0&&cv.offsetWidth>0)?rect.width/cv.offsetWidth:1;
        const x=(ev.clientX-rect.left)/sc, y=(ev.clientY-rect.top)/sc;
        const [a,b]=visWin(M);
        let wi=Math.round(reg.chart.scales.x.getValueForPixel(x));
        wi=Math.max(0,Math.min(wi,b-a));
        quoteShow(a+wi, cv, y);
      }
      function attachQuote(reg,cv,cw){
        const xv=el("div","xhair-v"), xh=el("div","xhair-h");
        cw.appendChild(xv); cw.appendChild(xh);
        bRegs.push({reg,cv,xv,xh});
        cv.addEventListener("dblclick",ev=>{ qOn=!qOn; if(qOn) quoteMove(reg,cv,ev); else quoteHide(); });
        cv.addEventListener("mousemove",ev=>{ if(qOn) quoteMove(reg,cv,ev); });
      }

      // ---- 日K面板 (最上方) ----
      if(showK()&&kd){
        const lastC=last(KC);
        let prevC=null; for(let i=KC.length-2;i>=0;i--){ if(KC[i]!=null){ prevC=KC[i]; break; } }
        const chg=(lastC!=null&&prevC!=null)?Number((lastC-prevC).toFixed(2)):null;
        const pct=(chg!=null&&prevC)?` <span class="dlt">(${chg>=0?"+":""}${(100*chg/prevC).toFixed(2)}%)</span>`:"";
        const panel=el("div","stk-panel");
        panel.appendChild(el("div","stk-panelhd",
          `<span class="tagm">股價</span> 收盤 <b class="${chg>0?'up':(chg<0?'down':'')}">${lastC==null?'—':Number(lastC).toLocaleString('en-US')}</b> · 較前一日 <span class="dlt">${arrow(chg==null?undefined:chg)}</span>${pct}`));
        const cw=el("div","stk-canvas"); cw.style.height=chartH+"px";
        const cv=document.createElement("canvas"); cw.appendChild(cv); panel.appendChild(cw);
        body.appendChild(panel);
        try{
          const reg={kind:"k", dates:M, O:KO, H:KH, L:KL, C:KC};
          reg.chart=makeKChart(cv.getContext("2d"), reg);
          charts.push(reg);
          cv.addEventListener("wheel",e=>wheelZoom(reg,e),{passive:false});
          attachPan(reg,cv);
          attachQuote(reg,cv,cw);
        }catch(e){ cw.appendChild(el("div","warn","K棒載入失敗:"+e.message)); }
      }

      // ---- 金額換算 (淨部位×現股收盤×每口股數; 小型100股、一般2,000股) ----
      const shares=(s.name||"").startsWith("小型")?100:2000;
      let priceLast=null; if(KC){ for(let i=KC.length-1;i>=0;i--){ if(KC[i]!=null){ priceLast=KC[i]; break; } } }
      const showAmt=$("#gAmt").checked && priceLast!=null;
      const fAmt=v=>{ const a=Math.abs(v); const sign=v<0?"-":"+";
        return sign+(a>=1e8 ? (a/1e8).toFixed(2)+" 億" : (a/1e4).toFixed(0)+" 萬"); };
      const amtHtml=(lv,ch)=>{
        if(!showAmt) return "";
        const la=lv==null?"—":fAmt(lv*priceLast*shares).replace(/^\+/,"");
        const ca=ch==null?"—":fAmt(ch*priceLast*shares);
        return ` · 金額 <b class="${lv>0?'up':(lv<0?'down':'')}">${la}</b> · 增減金額 <span class="dlt ${ch>0?'up':(ch<0?'down':'')}">${ca}</span>`;
      };

      if(showPos) vis.forEach(k=>{
        const lv=last(ser[k].lv), ch=last(ser[k].ch);
        const panel=el("div","stk-panel");
        panel.appendChild(el("div","stk-panelhd",
          `<span class="tagm">${k==="特定法人"?"法人":k}</span> 淨部位 <b class="${lv>0?'up':(lv<0?'down':'')}">${lv==null?'—':Number(lv).toLocaleString('en-US')}</b> · 較前一日 <span class="dlt">${arrow(ch)}</span>${amtHtml(lv,ch)}`));
        const cw=el("div","stk-canvas"); cw.style.height=Math.round(chartH*0.62)+"px";   // 籌碼副圖較矮 (仿看盤軟體比例)
        const cv=document.createElement("canvas"); cw.appendChild(cv); panel.appendChild(cw);
        body.appendChild(panel);
        try{
          const reg={chart:makeChart(cv.getContext("2d"), M, PS[k].lv, PS[k].ch, showK()&&!!kd), dates:M, lv:PS[k].lv, ch:PS[k].ch};
          charts.push(reg);
          cv.addEventListener("wheel",e=>wheelZoom(reg,e),{passive:false});
          attachPan(reg,cv);
          attachQuote(reg,cv,cw);
        }
        catch(e){ cw.appendChild(el("div","warn","圖表載入失敗:"+e.message)); }
      });
      blk.appendChild(body); blocks.appendChild(blk);
    });
    savePrefs();
  }

  function syncChips(){
    chipsEl.innerHTML="";
    selected.forEach(code=>{ const s=byCode[code]||{code,name:code};
      const c=el("span","chip",`${s.name} <span class="c">${code}</span> <b>×</b>`);
      c.querySelector("b").onclick=()=>removeStock(code);
      chipsEl.appendChild(c); });
    document.querySelectorAll("#pg input[type=checkbox]").forEach(i=>{ i.checked=selected.includes(i.value); });
  }

  async function addStock(code){
    if(selected.includes(code)) return;
    selected.push(code);
    if(!(code in docs)){
      try{ docs[code]=await getJSON(`stocks/${code}.json`); }catch(e){ docs[code]=null; }
    }
    if(!(code in fklines)){
      try{ fklines[code]=await getJSON(`fkline/${code}.json`); }catch(e){ fklines[code]=null; }
    }
    const sid=(byCode[code]||{}).sid;
    if(!fklines[code] && sid && !(sid in klines)){
      try{ klines[sid]=await getJSON(`kline/${sid}.json`); }catch(e){ klines[sid]=null; }
    }
  }
  function removeStock(code){
    const i=selected.indexOf(code); if(i>=0) selected.splice(i,1);
    syncChips(); render();
  }
  async function addMany(codes){
    for(const c of codes) await addStock(c);
    syncChips(); render();
  }

  // ---- 一次輸入多檔 ----------------------------------------------------------
  function doAdd(){
    const raw=$("#q").value.trim(); if(!raw) return;
    // 若是從 datalist 選的單一項目 (格式「CD  台積電  2330」), 直接命中
    const parts=raw.split(/[,，、;；\s]+/).filter(Boolean);
    if(parts.length>1 && byCode[parts[0]] && byCode[parts[0]].name===parts[1]){
      addMany([parts[0]]); $("#q").value=""; return;
    }
    const found=[], miss=[];
    parts.forEach(p=>{ const s=findStock(p); if(s){ if(!found.includes(s.code)) found.push(s.code); } else miss.push(p); });
    if(found.length) addMany(found);
    $("#q").value="";
    if(miss.length) alert("找不到:"+miss.join("、"));
  }
  $("#addBtn").onclick=doAdd;
  $("#q").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); doAdd(); } });
  $("#clearBtn").onclick=()=>{ selected.length=0; syncChips(); render(); };

  // ---- 從清單勾選 ------------------------------------------------------------
  const pg=$("#pg");
  stocks.forEach(s=>{
    const lab=el("label","pick");
    const cb=document.createElement("input"); cb.type="checkbox"; cb.value=s.code;
    cb.onchange=async()=>{ if(cb.checked){ await addStock(s.code); syncChips(); render(); } else removeStock(s.code); };
    lab.appendChild(cb);
    lab.appendChild(el("span","pk",`${s.name} <span class="c">${s.code}·${s.sid||""}</span>`));
    lab.dataset.key=`${s.code} ${s.name} ${s.sid||""}`.toLowerCase();
    pg.appendChild(lab);
  });
  $("#pickBtn").onclick=()=>{ const p=$("#picker"); p.hidden=!p.hidden; if(!p.hidden) $("#pf").focus(); };
  $("#pf").addEventListener("input",e=>{
    const q=e.target.value.trim().toLowerCase();
    pg.querySelectorAll(".pick").forEach(l=>{ l.style.display=(!q||l.dataset.key.includes(q))?"flex":"none"; });
  });

  // ---- 面板勾選 --------------------------------------------------------------
  CKS.concat([$("#gK"),$("#gArea"),$("#gBar"),$("#gAmt"),$("#cols")]).forEach(cb=>cb.addEventListener("change",render));

  // ---- 期間選擇 --------------------------------------------------------------
  if(allDates.length){
    const lo=d2i(allDates[0]), hi=d2i(allDates[allDates.length-1]);
    [$("#dFrom"),$("#dTo")].forEach(n=>{ n.min=lo; n.max=hi; });
  }
  syncRangeInputs();
  $("#dFrom").addEventListener("change",()=>{ range.from=i2d($("#dFrom").value); applyRange(); });
  $("#dTo").addEventListener("change",()=>{ range.to=i2d($("#dTo").value); applyRange(); });
  document.querySelectorAll("button.rng").forEach(b=>b.onclick=()=>{
    const m=parseInt(b.dataset.m,10);
    if(!m){ range.from=null; range.to=null; }
    else{
      const lastD=allDates[allDates.length-1]; if(!lastD) return;
      const dt=new Date(lastD.replaceAll("/","-")); dt.setMonth(dt.getMonth()-m);
      range.from=dt.toISOString().slice(0,10).replaceAll("-","/"); range.to=null;
    }
    applyRange();
  });

  // ---- 偏好恢復 + 網址預選 ?code=CD,DH ---------------------------------------
  const saved=loadPrefs();
  if(saved){
    if(Array.isArray(saved.ck)) CKS.forEach((c,i)=>{ if(typeof saved.ck[i]==="boolean") c.checked=saved.ck[i]; });
    ["gK","gArea","gBar","gAmt"].forEach(id=>{ if(typeof saved[id]==="boolean") $("#"+id).checked=saved[id]; });
    if(saved.cols) $("#cols").value=saved.cols;
    if(saved.from!==undefined||saved.to!==undefined){ range.from=saved.from||null; range.to=saved.to||null; syncRangeInputs(); }
  }
  const pre=new URLSearchParams(location.search).get("code");
  if(pre){
    const list=[]; pre.split(",").forEach(c=>{ const s=byCode[c.trim()]||findStock(c.trim()); if(s&&!list.includes(s.code)) list.push(s.code); });
    await addMany(list);
  } else if(saved && Array.isArray(saved.codes) && saved.codes.length){
    await addMany(saved.codes.filter(c=>byCode[c]));   // 回訪: 恢復上次的選股組合
  } else { syncChips(); render(); }
})();
</script>
</body>
</html>
