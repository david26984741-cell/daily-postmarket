<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>股票期貨 — 大額交易人 主力/自然人/特定法人</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<header class="top"><div class="wrap">
  <h1><a href="index.html" style="color:inherit">每日盤後資料</a><small>大額交易人 · 股票期貨</small></h1>
  <nav class="main" id="nav"></nav>
</div></header>

<div class="wrap">
  <div class="crumbs"><a href="index.html">← 當日整合總覽</a></div>
  <h2 class="sec">大額交易人股票期貨 <span class="tag" id="dchip"></span></h2>
  <p class="lead">前十大交易人未平倉(所有契約)。特定法人=前十大特定法人淨部位;自然人=前十大合計−特定法人;主力=自然人−特定法人。區域圖=淨部位,柱=每日增減。</p>

  <div class="stk-toolbar">
    <input id="q" list="stocklist" placeholder="輸入代號或名稱,如 2330 / 台積電 / CD" autocomplete="off">
    <datalist id="stocklist"></datalist>
    <button id="addBtn">加入比較</button>
    <button id="clearBtn" class="ghost">清除</button>
  </div>
  <div class="chips" id="chips"></div>

  <div id="blocks" class="stk-blocks"></div>
  <div id="empty" class="lead" style="margin-top:20px">上方搜尋並加入一檔或多檔個股,即可比較。</div>

  <footer>資料來源:臺灣期貨交易所。淨部位=買方−賣方(口)。本網站僅供參考,不構成投資建議。</footer>
</div>

<script src="assets/app.js"></script>
<script>
(async function(){
  // nav
  const nav=$("#nav");
  CATS.forEach(c=>{ const href = c.id==="stocks" ? "stocks.html" : `detail.html?cat=${c.id}`;
    const a=el("a",null,c.title); a.href=href; a.dataset.k=c.id; nav.appendChild(a); });
  navActive("stocks");

  const idx=await getJSON("index.json");
  $("#dchip").innerHTML = idx.latest_date? `資料日期 <b>${idx.latest_date}</b> · 共 ${(idx.stocks||[]).length} 檔`:"";
  const stocks=idx.stocks||[];
  const byCode={}; stocks.forEach(s=>byCode[s.code]=s);

  // datalist (代號 名稱 證券代號 皆可搜尋)
  const dl=$("#stocklist");
  stocks.forEach(s=>{ const o=el("option"); o.value=`${s.code}  ${s.name}  ${s.sid||""}`; dl.appendChild(o); });

  function findStock(q){
    q=(q||"").trim(); if(!q) return null;
    const first=q.split(/\s+/)[0];
    if(byCode[first]) return byCode[first];                 // datalist 選取 "CD  台積電 2330"
    if(byCode[q]) return byCode[q];                          // 直接打代號
    let s=stocks.find(x=>x.name===q || x.sid===q); if(s) return s;
    const ql=q.toLowerCase();
    return stocks.find(x=> x.code.toLowerCase()===ql) ||
           stocks.find(x=> x.name.includes(q) || (x.sid&&x.sid.includes(q)) || x.code.toLowerCase().includes(ql));
  }

  const selected=[]; // codes
  const blocks=$("#blocks"), chipsEl=$("#chips"), emptyEl=$("#empty");
  function syncChips(){
    chipsEl.innerHTML="";
    selected.forEach(code=>{ const s=byCode[code]||{code,name:code};
      const c=el("span","chip",`${s.name} <span class="c">${code}</span> <b>×</b>`);
      c.querySelector("b").onclick=()=>{ const i=selected.indexOf(code); if(i>=0){selected.splice(i,1); document.getElementById("blk-"+code)?.remove(); syncChips();} };
      chipsEl.appendChild(c); });
    emptyEl.style.display = selected.length? "none":"block";
  }

  const NET=(rows,t)=>{ const r=(rows||[]).find(x=>x.month==="999999"&&x.type===t); return r?(r.top10_buy-r.top10_sell):null; };
  function series(doc){
    const dates=Object.keys(doc.records).sort();
    const o={dates, 主力:{lv:[],ch:[]}, 自然人:{lv:[],ch:[]}, 特定法人:{lv:[],ch:[]}}; const prev={};
    dates.forEach(d=>{
      const rows=doc.records[d]; const t0=NET(rows,"0"), t1=NET(rows,"1");
      const inst=t1;
      const nat=(t0!=null&&t1!=null)? t0-t1 : null;
      const main=(nat!=null&&inst!=null)? nat-inst : null;
      [["主力",main],["自然人",nat],["特定法人",inst]].forEach(([k,v])=>{
        o[k].lv.push(v); o[k].ch.push((prev[k]!=null&&v!=null)? v-prev[k] : null); prev[k]=v; });
    });
    return o;
  }

  const PANELS=[["主力","#ffb454"],["自然人","#4ea1ff"],["特定法人","#c084fc"]];
  function last(a){ for(let i=a.length-1;i>=0;i--) if(a[i]!=null) return a[i]; return null; }
  function fmtSigned(n){ if(n==null) return "—"; const s=n>0?"+":""; return s+Number(n).toLocaleString("en-US"); }

  function makeChart(ctx,dates,lv,ch,color){
    return new Chart(ctx,{ data:{ labels:dates, datasets:[
      {type:"line",label:"淨部位",data:lv,yAxisID:"y",borderColor:color,backgroundColor:color+"22",fill:"origin",pointRadius:0,borderWidth:1.6,tension:.15,order:2},
      {type:"bar",label:"每日增減",data:ch,yAxisID:"y1",order:1,borderWidth:0,
        backgroundColor:ch.map(v=>v==null?"rgba(0,0,0,0)":(v>=0?"rgba(255,91,91,.85)":"rgba(34,197,94,.85)"))}
    ]}, options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:"index",intersect:false},
      plugins:{ legend:{display:false},
        tooltip:{ callbacks:{ label:(c)=>`${c.dataset.label}: ${Number(c.raw).toLocaleString("en-US")}` } } },
      scales:{
        x:{ ticks:{color:"#7d8ea0",maxTicksLimit:7,font:{size:9}}, grid:{color:"rgba(255,255,255,.04)"} },
        y:{ position:"left", ticks:{color:"#8aa0b4",font:{size:9}}, grid:{color:"rgba(255,255,255,.06)"} },
        y1:{ position:"right", ticks:{color:"#6f8296",font:{size:9}}, grid:{drawOnChartArea:false} }
      } } });
  }

  async function addStock(code){
    if(selected.includes(code)) return;
    selected.push(code); syncChips();
    const blk=el("div","stk-block"); blk.id="blk-"+code;
    const s=byCode[code]||{code,name:code};
    blk.appendChild(el("div","stk-title",`${s.name} <span class="c">${code} · ${s.sid||""}</span>`));
    const body=el("div"); blk.appendChild(body); blocks.appendChild(blk);
    let doc;
    try{ doc=await getJSON(`stocks/${code}.json`); }catch(e){ body.appendChild(el("div","warn","找不到此個股資料")); return; }
    const ser=series(doc);
    PANELS.forEach(([k,color])=>{
      const lv=last(ser[k].lv), ch=last(ser[k].ch);
      const panel=el("div","stk-panel");
      panel.appendChild(el("div","stk-panelhd",
        `<span class="tagm">【前十】${k}</span> 淨部位 <b class="${lv>0?'up':(lv<0?'down':'')}">${lv==null?'—':Number(lv).toLocaleString('en-US')}</b> · 較前一日 <span class="dlt">${arrow(ch)}</span>`));
      const cw=el("div","stk-canvas"); const cv=document.createElement("canvas"); cw.appendChild(cv); panel.appendChild(cw);
      body.appendChild(panel);
      try{ makeChart(cv.getContext("2d"), ser.dates, ser[k].lv, ser[k].ch, color); }
      catch(e){ cw.appendChild(el("div","warn","圖表載入失敗:"+e.message)); }
    });
  }

  function doAdd(){ const s=findStock($("#q").value); if(s){ addStock(s.code); $("#q").value=""; } else if($("#q").value.trim()){ alert("找不到:"+$("#q").value); } }
  $("#addBtn").onclick=doAdd;
  $("#q").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); doAdd(); } });
  $("#clearBtn").onclick=()=>{ selected.slice().forEach(c=>{document.getElementById("blk-"+c)?.remove();}); selected.length=0; syncChips(); };

  // 支援網址預選 ?code=CD 或 ?code=CD,DH
  const pre=new URLSearchParams(location.search).get("code");
  if(pre){ for(const c of pre.split(",")){ const s=byCode[c.trim()]||findStock(c.trim()); if(s) await addStock(s.code); } }
  syncChips();
})();
</script>
</body>
</html>
